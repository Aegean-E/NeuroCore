<div class="flex gap-6 h-full">

    <!-- Left: Config panel -->
    <div class="w-80 flex-shrink-0 flex flex-col gap-4 overflow-y-auto custom-scrollbar">

        <div class="bg-slate-950/50 border border-slate-800 rounded-xl p-5 flex flex-col gap-4">
            <h3 class="font-semibold text-slate-200 text-sm">Analysis Type</h3>
            <select id="stat-test-type" onchange="updateStatForm()"
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-violet-500">
                <option value="descriptive">Descriptive Statistics</option>
                <option value="one_sample_ttest">One-sample t-test</option>
                <option value="two_sample_ttest">Two-sample t-test (Welch's)</option>
                <option value="paired_ttest">Paired t-test</option>
                <option value="mann_whitney">Mann-Whitney U</option>
                <option value="pearson">Pearson Correlation</option>
                <option value="spearman">Spearman Correlation</option>
                <option value="chi_square">Chi-square Goodness-of-fit</option>
                <option value="anova">One-way ANOVA (2+ groups)</option>
                <option value="confidence_interval">Confidence Interval</option>
                <option value="intervention">Intervention Analysis (Baseline vs. Treatment)</option>
            </select>
        </div>

        <div class="bg-slate-950/50 border border-slate-800 rounded-xl p-5 flex flex-col gap-4">
            <h3 class="font-semibold text-slate-200 text-sm">Data Input</h3>

            <div id="stat-dataset-a">
                <label id="stat-label-a" class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1 block">Dataset A</label>
                <textarea id="stat-data-a" rows="4"
                          placeholder="Comma or newline separated numbers&#10;e.g. 5.2, 6.1, 4.8, 7.3"
                          class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-1 focus:ring-violet-500 resize-none"></textarea>
            </div>

            <div id="stat-dataset-b" class="hidden">
                <label id="stat-label-b" class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1 block">Dataset B</label>
                <textarea id="stat-data-b" rows="4"
                          placeholder="Second dataset (same format)"
                          class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-1 focus:ring-violet-500 resize-none"></textarea>
            </div>

            <!-- Extra params -->
            <div id="stat-param-mu" class="hidden">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1 block">Hypothesized Mean (H₀: μ₀)</label>
                <input type="number" step="any" id="stat-mu" value="0"
                       class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-violet-500">
            </div>

            <div id="stat-param-alpha">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1 block">Alpha (α)</label>
                <select id="stat-alpha" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-violet-500">
                    <option value="0.05" selected>0.05</option>
                    <option value="0.01">0.01</option>
                    <option value="0.10">0.10</option>
                </select>
            </div>

            <div id="stat-param-confidence" class="hidden">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1 block">Confidence Level</label>
                <select id="stat-confidence" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-violet-500">
                    <option value="0.90">90%</option>
                    <option value="0.95" selected>95%</option>
                    <option value="0.99">99%</option>
                </select>
            </div>

            <button onclick="runStatTest()"
                    class="w-full bg-violet-600 hover:bg-violet-500 text-white px-4 py-2.5 rounded-xl text-sm font-semibold transition-all flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                Run Analysis
            </button>
        </div>

        <!-- Significance legend -->
        <div class="bg-slate-950/50 border border-slate-800 rounded-xl p-4">
            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Significance Stars</p>
            <div class="flex flex-col gap-1 text-xs font-mono text-slate-400">
                <span><span class="text-violet-300">***</span> p &lt; 0.001</span>
                <span><span class="text-violet-300">**</span>&nbsp; p &lt; 0.01</span>
                <span><span class="text-violet-300">*</span>&nbsp;&nbsp; p &lt; 0.05</span>
                <span><span class="text-slate-500">.</span>&nbsp;&nbsp;&nbsp; p &lt; 0.10</span>
                <span><span class="text-slate-600">ns</span>&nbsp; p ≥ 0.10</span>
            </div>
        </div>
    </div>

    <!-- Right: Results -->
    <div class="flex-grow flex flex-col min-h-0 min-w-0">
        <div class="flex items-center justify-between mb-3">
            <h3 class="font-semibold text-slate-200">Results</h3>
            <button id="stat-copy-btn" onclick="copyStatResults()" class="hidden px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-xs text-slate-300 transition-all flex items-center gap-1.5">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                Copy JSON
            </button>
        </div>
        <div id="stat-results"
             class="flex-grow bg-slate-950/60 border border-slate-800 rounded-xl p-6 overflow-y-auto custom-scrollbar">
            <div class="flex flex-col items-center justify-center h-full text-slate-600 gap-3">
                <svg class="w-10 h-10 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                <p class="text-sm">Enter data and run analysis.</p>
            </div>
        </div>
    </div>
</div>

<script>
let _statRawResult = null;

const NEEDS_B = ['two_sample_ttest','paired_ttest','mann_whitney','pearson','spearman','chi_square','anova','intervention'];
const NEEDS_MU = ['one_sample_ttest'];
const NEEDS_CONF = ['confidence_interval'];

function updateStatForm() {
    const type = document.getElementById('stat-test-type').value;
    document.getElementById('stat-dataset-b').classList.toggle('hidden', !NEEDS_B.includes(type));
    document.getElementById('stat-param-mu').classList.toggle('hidden', !NEEDS_MU.includes(type));
    document.getElementById('stat-param-confidence').classList.toggle('hidden', !NEEDS_CONF.includes(type));
    document.getElementById('stat-param-alpha').classList.toggle('hidden', NEEDS_CONF.includes(type));

    // Labels
    const labels = {
        'intervention': ['Baseline Data', 'Intervention Data'],
        'chi_square': ['Observed Counts', 'Expected Counts (optional)'],
        'anova': ['Group 1', 'Group 2 (add more groups comma-separated on new lines)'],
    };
    const [la, lb] = labels[type] || ['Dataset A', 'Dataset B'];
    document.getElementById('stat-label-a').textContent = la;
    if (lb) document.getElementById('stat-label-b').textContent = lb;
}

async function runStatTest() {
    const type = document.getElementById('stat-test-type').value;
    const dataA = document.getElementById('stat-data-a').value.trim();
    const dataB = document.getElementById('stat-data-b').value.trim();
    const mu = document.getElementById('stat-mu').value;
    const alpha = document.getElementById('stat-alpha').value;
    const confidence = document.getElementById('stat-confidence').value;

    const el = document.getElementById('stat-results');
    el.innerHTML = '<div class="flex items-center gap-3 text-slate-500"><svg class="w-5 h-5 animate-spin text-violet-400" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>Computing…</div>';
    document.getElementById('stat-copy-btn').classList.add('hidden');

    try {
        const body = new URLSearchParams({ type, data_a: dataA, data_b: dataB, mu, alpha, confidence });
        const resp = await fetch('/research/statistics/analyze', { method: 'POST', body });
        const data = await resp.json();
        _statRawResult = data;
        if (data.error) { el.innerHTML = `<div class="text-red-400 text-sm p-4 bg-red-900/20 border border-red-800/40 rounded-xl">${data.error}</div>`; return; }
        el.innerHTML = renderStatResult(data);
        document.getElementById('stat-copy-btn').classList.remove('hidden');
    } catch (e) {
        el.innerHTML = `<div class="text-red-400 text-sm">${e.message}</div>`;
    }
}

function renderStatResult(d) {
    const rows = Object.entries(d)
        .filter(([k]) => k !== 'interpretation' && k !== 'normality' && k !== 'ci' && !['group_a','group_b','group_stats','welch_ttest','mann_whitney','bootstrap_ci','baseline','intervention','warnings'].includes(k))
        .map(([k, v]) => {
            if (typeof v === 'object' || v === null) return '';
            const label = k.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
            const valStr = typeof v === 'boolean' ? (v ? '<span class="text-emerald-400">Yes</span>' : '<span class="text-slate-500">No</span>') : `<span class="font-mono">${v}</span>`;
            return `<tr class="border-b border-slate-800/50"><td class="py-1.5 pr-4 text-slate-500 text-xs">${label}</td><td class="py-1.5 text-slate-200 text-sm">${valStr}</td></tr>`;
        }).join('');

    const interpretation = d.interpretation
        ? `<div class="mt-4 p-4 bg-violet-900/20 border border-violet-700/40 rounded-xl"><p class="text-sm text-violet-200 leading-relaxed">${d.interpretation}</p></div>`
        : '';

    const normality = d.normality
        ? `<div class="mt-3 p-3 bg-slate-900 border border-slate-800 rounded-xl"><p class="text-xs font-semibold text-slate-400 mb-1">Normality (${d.normality.test})</p><p class="text-xs ${d.normality.normal ? 'text-emerald-400' : 'text-amber-400'}">${d.normality.interpretation}</p></div>`
        : '';

    const ci = d.ci
        ? `<div class="mt-3 p-3 bg-slate-900 border border-slate-800 rounded-xl"><p class="text-xs font-semibold text-slate-400 mb-1">Confidence Interval</p><p class="text-xs text-slate-300">${d.ci.interpretation}</p></div>`
        : '';

    return `
    <div class="flex flex-col gap-4">
        <h4 class="font-semibold text-slate-200">${d.test || 'Results'}</h4>
        <table class="w-full">${rows}</table>
        ${normality}${ci}${interpretation}
    </div>`;
}

function copyStatResults() {
    if (_statRawResult) {
        navigator.clipboard.writeText(JSON.stringify(_statRawResult, null, 2))
            .then(() => window.showToast('Copied JSON to clipboard', 'success'));
    }
}

// Init form state
updateStatForm();
</script>
