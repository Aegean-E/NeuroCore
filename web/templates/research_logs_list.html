{% if logs %}
    {% for log in logs %}
    <div class="flex items-center justify-between bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 group text-sm">
        <div class="flex items-center gap-3">
            <span class="text-xs text-slate-500 font-mono w-24 flex-shrink-0">{{ log.log_date }}</span>
            <span class="text-violet-300 text-xs">{{ log.metric_name }}</span>
            <span class="font-mono font-bold text-slate-200">{{ log.value }}</span>
            {% if log.notes %}<span class="text-xs text-slate-500 truncate max-w-32">{{ log.notes }}</span>{% endif %}
        </div>
        <button hx-delete="/research/metric-logs/{{ log.id }}"
                hx-on::after-request="htmx.ajax('GET', window._logsUrl || '/research/metric-logs/' + '{{ log.intervention_id }}', {target:'#logs-list', swap:'innerHTML'})"
                class="opacity-0 group-hover:opacity-100 p-1 rounded text-slate-600 hover:text-red-400 transition-all">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
    </div>
    {% endfor %}
{% else %}
    <p class="text-xs text-slate-600 text-center py-4">No data logged yet.</p>
{% endif %}
