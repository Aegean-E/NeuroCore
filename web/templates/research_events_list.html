{% if events %}
    {% for ev in events %}
    <div class="flex items-center justify-between bg-slate-900 border border-slate-800 rounded-lg px-4 py-2.5 group">
        <div class="flex items-center gap-3">
            <span class="text-xs text-slate-500 font-mono flex-shrink-0">{{ ev.event_datetime[:10] }}</span>
            <span class="px-2 py-0.5 rounded-full text-xs
                {% if ev.severity == 'high' %}bg-red-900/50 text-red-300 border border-red-700/40
                {% elif ev.severity == 'medium' %}bg-amber-900/50 text-amber-300 border border-amber-700/40
                {% else %}bg-slate-800 text-slate-400 border border-slate-700{% endif %}">
                {{ ev.severity | capitalize }}
            </span>
            <span class="text-sm font-medium text-slate-200">{{ ev.name }}</span>
            {% if ev.notes %}<span class="text-xs text-slate-500 truncate max-w-48">{{ ev.notes }}</span>{% endif %}
        </div>
        <button hx-delete="/research/events/{{ ev.id }}"
                hx-on::after-request="htmx.ajax('GET', '/research/events/{{ ev.intervention_id }}', {target:'#events-list', swap:'innerHTML'})"
                class="opacity-0 group-hover:opacity-100 p-1 rounded text-slate-600 hover:text-red-400 transition-all">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
    </div>
    {% endfor %}
{% else %}
    <p class="text-sm text-slate-600 text-center py-8">No events logged for this intervention.</p>
{% endif %}
