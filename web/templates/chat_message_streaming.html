<div class="flex flex-col items-end space-y-1">
    <div class="bg-blue-600 p-4 rounded-2xl rounded-tr-none max-w-[80%] text-white shadow-lg">
        {% if user_message is string %}
            <p class="text-sm">{{ user_message }}</p>
        {% else %}
            {% for part in user_message %}
                {% if part.type == 'text' %}
                    <p class="text-sm">{{ part.text }}</p>
                {% elif part.type == 'image_url' %}
                    <img src="{{ part.image_url.url }}" class="max-w-full h-auto rounded-lg mt-2 max-h-64 border border-blue-400/50">
                {% endif %}
            {% endfor %}
        {% endif %}
    </div>
</div>

<div class="bg-slate-800 p-4 rounded-2xl rounded-tl-none max-w-[80%] shadow-lg border border-slate-700/50">
    <div class="text-sm prose prose-invert" id="ai-content-{{ msg_id }}">
        <span class="animate-pulse text-slate-500 stream-placeholder">Thinking...</span>
    </div>
    <div class="flex items-center justify-between mt-2 stream-status" style="display: none;">
        <div class="flex items-center gap-2 flex-wrap text-xs">
            <span class="text-slate-500">Time: <span class="stream-timer font-mono">0.0</span>s</span>
            <span class="token-usage hidden">
                <span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded bg-sky-950/70 border border-sky-800/50 text-sky-300 font-semibold" title="Prompt tokens">↑ <span class="prompt-tokens">—</span></span>
                <span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded bg-emerald-950/70 border border-emerald-800/50 text-emerald-300 font-semibold" title="Completion tokens">↓ <span class="completion-tokens">—</span></span>
                <span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded bg-amber-950/80 border border-amber-700/60 text-amber-300 font-bold" title="Total tokens">Σ <span class="total-tokens">—</span></span>
            </span>
        </div>
    </div>
</div>

<script>
    (function(){
        const source = new EventSource('/chat/stream/{{ session_id }}');
        const contentDiv = document.getElementById('ai-content-{{ msg_id }}');
        const statusDiv = contentDiv.parentElement.querySelector('.stream-status');
        const timerSpan = statusDiv.querySelector('.stream-timer');
        const tokenUsageEl = statusDiv.querySelector('.token-usage');
        const promptTokensEl = statusDiv.querySelector('.prompt-tokens');
        const completionTokensEl = statusDiv.querySelector('.completion-tokens');
        const totalTokensEl = statusDiv.querySelector('.total-tokens');
        
        let firstTokenReceived = false;
        let mdBuffer = "";
        let startTime = Date.now();
        let timerInterval = setInterval(() => {
            timerSpan.innerText = ((Date.now() - startTime) / 1000).toFixed(1);
        }, 100);

        source.onmessage = function(event) {
            if (!firstTokenReceived) {
                const placeholder = contentDiv.querySelector('.stream-placeholder');
                if (placeholder) placeholder.remove();
                firstTokenReceived = true;
                statusDiv.style.display = 'flex';
            }
            
            const chunk = JSON.parse(event.data);
            if (chunk.text) {
                mdBuffer += chunk.text;
                contentDiv.innerText = mdBuffer;
                
                const messageContainer = document.getElementById('chat-messages');
                if (messageContainer) {
                    messageContainer.scrollTop = messageContainer.scrollHeight;
                }
            }
        };
        
        source.addEventListener('replace', function(event) {
            const chunk = JSON.parse(event.data);
            if (chunk.text) {
                contentDiv.innerText = chunk.text;
                const messageContainer = document.getElementById('chat-messages');
                if (messageContainer) {
                    messageContainer.scrollTop = messageContainer.scrollHeight;
                }
            }
        });
        
        source.addEventListener('usage', function(event) {
            try {
                const usage = JSON.parse(event.data);
                if (usage && usage.total_tokens !== undefined) {
                    promptTokensEl.innerText = usage.prompt_tokens.toLocaleString();
                    completionTokensEl.innerText = usage.completion_tokens.toLocaleString();
                    totalTokensEl.innerText = usage.total_tokens.toLocaleString();
                    tokenUsageEl.classList.remove('hidden');
                    statusDiv.style.display = 'flex';

                    // Update the session token counter in the header if present
                    const tokenCounter = document.getElementById('session-token-count');
                    if (tokenCounter) {
                        // Trigger an HTMX refresh of the token count element
                        htmx.trigger(tokenCounter, 'tokenUsageUpdated', { usage });
                    }
                }
            } catch(e) {
                console.warn('Failed to parse usage event', e);
            }
        });
        
        source.addEventListener('rename', function(event) {
            htmx.trigger(document.body, "sessionsChanged");
        });
        
        source.addEventListener('error', function(e) {
            if (e.data) {
                try {
                    const err = JSON.parse(e.data);
                    if (!firstTokenReceived) {
                        const placeholder = contentDiv.querySelector('.stream-placeholder');
                        if (placeholder) placeholder.remove();
                        statusDiv.style.display = 'flex';
                    }
                    contentDiv.innerText = "Error: " + (err.error || "Unknown stream error");
                } catch(ex) {
                    console.error("Stream parse error", ex);
                }
            }
        });
        
        source.addEventListener('done', function() {
            clearInterval(timerInterval);
            timerSpan.innerText = ((Date.now() - startTime) / 1000).toFixed(1);
            source.close();
        });
    })();
</script>
