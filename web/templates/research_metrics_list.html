{% if metrics %}
<div class="flex flex-col gap-2">
    {% for m in metrics %}
    <div class="flex items-center justify-between bg-slate-900 border border-slate-800 rounded-lg px-4 py-2.5 group">
        <div class="flex items-center gap-3">
            <span class="font-medium text-slate-200 text-sm">{{ m.name }}</span>
            {% if m.unit %}<span class="text-xs text-violet-400 bg-violet-900/30 border border-violet-800/40 px-2 py-0.5 rounded-full">{{ m.unit }}</span>{% endif %}
            {% if m.description %}<span class="text-xs text-slate-500">{{ m.description }}</span>{% endif %}
        </div>
        <button hx-delete="/research/metrics/{{ m.id }}"
                hx-confirm="Delete this metric? Logged data using this metric name will NOT be deleted."
                hx-on::after-request="htmx.trigger(document.body,'metricsChanged')"
                class="opacity-0 group-hover:opacity-100 p-1 rounded text-slate-600 hover:text-red-400 transition-all">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
    </div>
    {% endfor %}
</div>
{% else %}
<p class="text-sm text-slate-500 py-4 text-center">No metrics defined yet.</p>
{% endif %}
